<html lang="en">
<head>

    <title>Happy Ramadan My Love</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="stars"></div>

                <div class="gift-ribbon"></div>
            </div>
        </div>

        <div id="final-message" class="hidden">
            <h2 class="message-text">Mata Biriyani Ona Patiyoo</h2>
        </div>
    </div>
